<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Choose a bank app to pay</title>
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
  .payload { background: #f4f4f4; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
  .payload .amount { font-size: 2rem; font-weight: 700; }
  .payload .merchant { color: #555; }
  h2 { font-size: 1rem; color: #444; margin-bottom: 8px; }
  .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .bank-tile { display: flex; flex-direction: column; align-items: center; gap: 6px; border: none; background: none; padding: 4px; cursor: pointer; font-family: inherit; }
  .bank-tile .icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.3rem; font-weight: 700; }
  .bank-tile .label { font-size: 0.78rem; color: #333; text-align: center; line-height: 1.2; }
  #error { color: #c0392b; }
  #paid { color: #2a9d8f; font-weight: 600; }
  #androidContinue { display: none; width: 100%; padding: 16px; margin-bottom: 24px; border: none; border-radius: 10px; background: #1a1a1a; color: white; font-size: 1.05rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="payload" id="payload">Loading payment details…</div>
  <a id="androidContinue" href="#">Continue to pay</a>
  <h2 id="banksHeading">Pay with</h2>
  <div id="banks" class="bank-grid"></div>

<script>
const token = window.location.pathname.split("/").pop();

// Android quirk: if the user has a default browser set (nearly everyone),
// tapping an *unverified* https:// link — which is what our QR encodes —
// goes straight to that browser and skips app resolution entirely. The
// native "Open with…" chooser only appears for unverified links when no
// default browser is set. The standard workaround (used by Firebase
// Dynamic Links, Branch.io, etc.) is an intent:// redirect, which forces
// Android's real intent-resolution system regardless of default-browser
// settings.
//
// This must be a real <a href="intent://..."> the browser navigates
// natively on click — a JS-computed location.href assignment (even from
// inside a genuine click handler) doesn't reliably carry Chrome's
// "trusted user activation" flag for intent:// navigation, so it can
// silently no-op instead of resolving to an app.
//
// Critically, the intent targets a scheme ("sgqrpay") that no browser can
// ever claim — not "https". Chrome refuses to navigate an intent:// link
// whose target could resolve back to a browser (itself, to avoid a loop),
// which is why an https-scheme intent:// silently did nothing at all here.
// All three bank apps register this shared scheme (in addition to their
// own individual custom scheme), so it's still ambiguous across exactly
// the 3 of them — forcing the real chooser — with zero risk of Chrome
// treating itself as a candidate.
//
// iOS ignores this entirely and just proceeds to load() below. Android
// also skips the bank-button list entirely — the whole point on Android
// is the native chooser, not a picker page.
const isAndroid = /Android/i.test(navigator.userAgent);
const skipRedirect = new URLSearchParams(window.location.search).has("nr");

if (isAndroid && !skipRedirect) {
  const continueBtn = document.getElementById("androidContinue");
  const fallback =
    window.location.href + (window.location.search ? "&" : "?") + "nr=1";
  const intentUrl =
    `intent://pay?token=${encodeURIComponent(token)}` +
    `#Intent;scheme=sgqrpay;S.browser_fallback_url=${encodeURIComponent(fallback)};end`;
  continueBtn.href = intentUrl;
  continueBtn.style.display = "block";
  document.getElementById("banksHeading").style.display = "none";
}

let banksCache = null;
let banksRendered = false;
let pollTimer = null;

function renderPayloadInfo(payload) {
  document.getElementById("payload").innerHTML = `
    <div class="merchant">Pay ${payload.merchant}</div>
    <div class="amount">${payload.currency} ${Number(payload.amount).toFixed(2)}</div>
    <div class="merchant">Ref: ${payload.reference}</div>
  `;
}

function renderCompleted() {
  document.getElementById("androidContinue").style.display = "none";
  document.getElementById("banksHeading").style.display = "none";
  document.getElementById("banks").innerHTML = `<p id="paid">This payment has already been completed.</p>`;
  stopWatching();
}

// iOS/Safari has no API to check "is this app installed" before the user
// taps anything — Apple deliberately doesn't expose that to web pages (it'd
// be a fingerprinting vector). A reactive check (navigate, then see if the
// page got backgrounded within a timeout) was tried and confirmed unreliable
// on real iOS Safari: attempting a custom-scheme navigation can trigger a
// transient visibilitychange even when no app actually opens, so it can't
// tell "opened" apart from "failed to open." All banks are always shown.
function renderBankButtons() {
  if (banksRendered || !banksCache) return;
  banksRendered = true;
  const banksEl = document.getElementById("banks");
  banksCache.forEach((bank) => {
    const tile = document.createElement("button");
    tile.className = "bank-tile";
    tile.dataset.bankId = bank.id;
    tile.innerHTML = `
      <span class="icon" style="background:${bank.color}">${bank.name.trim().split(/\s+/).pop().charAt(0)}</span>
      <span class="label">${bank.name}</span>
    `;
    tile.addEventListener("click", () => openBank(bank));
    banksEl.appendChild(tile);
  });
}

// Re-fetches just the payload (cheap) so the page can flip itself over to
// "completed" the moment some other tab/app approves it — covers the case
// where this tab stays open in the background while the user approves in
// the bank app, then comes back to it.
async function checkStatus() {
  const res = await fetch(`/api/payload/${token}`);
  if (!res.ok) {
    document.getElementById("payload").innerHTML = `<span id="error">Payment not found or expired.</span>`;
    stopWatching();
    return;
  }
  const payload = await res.json();
  renderPayloadInfo(payload);
  if (payload.paid) {
    renderCompleted();
    return;
  }
  if (!(isAndroid && !skipRedirect)) renderBankButtons();
}

function stopWatching() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  document.removeEventListener("visibilitychange", onVisibilityChange);
}

function onVisibilityChange() {
  if (!document.hidden) checkStatus();
}

async function load() {
  const [payloadRes, banksRes] = await Promise.all([
    fetch(`/api/payload/${token}`),
    fetch(`/api/banks`),
  ]);

  if (!payloadRes.ok) {
    document.getElementById("payload").innerHTML = `<span id="error">Payment not found or expired.</span>`;
    return;
  }

  const payload = await payloadRes.json();
  banksCache = await banksRes.json();

  renderPayloadInfo(payload);

  if (payload.paid) {
    renderCompleted();
    return;
  }

  if (!(isAndroid && !skipRedirect)) renderBankButtons();

  // Keep watching for completion: poll every 2s, and re-check immediately
  // whenever the tab regains focus (e.g. returning from the bank app).
  pollTimer = setInterval(checkStatus, 2000);
  document.addEventListener("visibilitychange", onVisibilityChange);
}

function openBank(bank) {
  window.location.href = `${bank.scheme}://pay?token=${encodeURIComponent(token)}`;
}

load();
</script>
</body>
</html>
