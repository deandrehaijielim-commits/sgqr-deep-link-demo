<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Choose a bank app to pay</title>
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
  .payload { background: #f4f4f4; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
  .payload .amount { font-size: 2rem; font-weight: 700; }
  .payload .merchant { color: #555; }
  h2 { font-size: 1rem; color: #444; margin-bottom: 8px; }
  .bank-btn { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin-bottom: 12px; border: none; border-radius: 10px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .bank-btn .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.6); margin-right: 12px; }
  #error { color: #c0392b; }
  #paid { color: #2a9d8f; font-weight: 600; }
</style>
</head>
<body>
  <div class="payload" id="payload">Loading payment details…</div>
  <h2 id="banksHeading">Pay with</h2>
  <div id="banks"></div>

<script>
const token = window.location.pathname.split("/").pop();

// Android quirk: if the user has a default browser set (nearly everyone),
// tapping an *unverified* https:// link — which is what our QR encodes —
// goes straight to that browser and skips app resolution entirely. The
// native "Open with…" chooser only appears for unverified links when no
// default browser is set. The standard workaround (used by Firebase
// Dynamic Links, Branch.io, etc.) is an intent:// redirect, which forces
// Android's real intent-resolution system regardless of default-browser
// settings. iOS ignores this entirely and just proceeds to load() below.
// The "nr" (no-redirect) param guards against looping back into this
// redirect once we land back here via the fallback URL.
(function () {
  const isAndroid = /Android/i.test(navigator.userAgent);
  const params = new URLSearchParams(window.location.search);
  if (isAndroid && !params.has("nr")) {
    const fallback =
      window.location.href + (window.location.search ? "&" : "?") + "nr=1";
    const intentUrl =
      `intent://${window.location.host}${window.location.pathname}` +
      `#Intent;scheme=https;S.browser_fallback_url=${encodeURIComponent(fallback)};end`;
    window.location.href = intentUrl;
  }
})();

async function load() {
  const [payloadRes, banksRes] = await Promise.all([
    fetch(`/api/payload/${token}`),
    fetch(`/api/banks`),
  ]);

  if (!payloadRes.ok) {
    document.getElementById("payload").innerHTML = `<span id="error">Payment not found or expired.</span>`;
    return;
  }

  const payload = await payloadRes.json();
  const banks = await banksRes.json();

  document.getElementById("payload").innerHTML = `
    <div class="merchant">Pay ${payload.merchant}</div>
    <div class="amount">${payload.currency} ${Number(payload.amount).toFixed(2)}</div>
    <div class="merchant">Ref: ${payload.reference}</div>
  `;

  if (payload.paid) {
    document.getElementById("banksHeading").style.display = "none";
    document.getElementById("banks").innerHTML = `<p id="paid">This payment has already been completed.</p>`;
    return;
  }

  const banksEl = document.getElementById("banks");
  banks.forEach((bank) => {
    const btn = document.createElement("button");
    btn.className = "bank-btn";
    btn.style.background = bank.color;
    btn.innerHTML = `<span class="dot"></span>${bank.name}`;
    btn.addEventListener("click", () => openBank(bank));
    banksEl.appendChild(btn);
  });
}

function openBank(bank) {
  window.location.href = `${bank.scheme}://pay?token=${encodeURIComponent(token)}`;
}

load();
</script>
</body>
</html>
